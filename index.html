<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>施俊豪 - 数字艺术作品集</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg-color: #f4f4f4;
      --text-main: #000;
      --text-inv: #fff;
      --glitch-blue: #0047FF; 
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: var(--bg-color);
      background-image: radial-gradient(#000 1px, transparent 1px);
      background-size: 16px 16px;
      font-family: 'Arial Black', 'Impact', 'PingFang SC', 'Microsoft YaHei', 'Heiti SC', sans-serif;
      user-select: none;
      -webkit-touch-callout: none;
    }

    @keyframes textFall {
      0% { transform: translateY(-80vh) scale(2) rotate(15deg); opacity: 0; }
      100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    }
    
    @keyframes screenShake {
      0% { transform: translate(0, 0) rotate(0deg); }
      20% { transform: translate(-10px, 12px) rotate(-1deg); }
      40% { transform: translate(10px, -10px) rotate(1deg); }
      60% { transform: translate(-6px, -6px) rotate(0deg); }
      80% { transform: translate(6px, 6px) rotate(1deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    @keyframes dotAppear {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-45deg); }
      100% { transform: translate(-50%, -50%) scale(0.15) rotate(0deg); }
    }

    @keyframes burstExpand {
      0% { transform: translate(-50%, -50%) scale(0.15) rotate(0deg); }
      20% { transform: translate(-50%, -50%) scale(1.4) rotate(15deg); }
      100% { transform: translate(-50%, -50%) scale(1.2) rotate(0deg); }
    }

    .shard-element { opacity: 0; }

    @keyframes splash1 { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); } 100% { opacity: 1; transform: translate(calc(-50% - 30vw), calc(-50% - 20vh)) scale(0.2) rotate(-90deg); } }
    @keyframes splash2 { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1.5) rotate(0deg); } 100% { opacity: 1; transform: translate(calc(-50% + 35vw), calc(-50% - 15vh)) scale(0.3) rotate(120deg); } }
    @keyframes splash3 { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(0deg); } 100% { opacity: 1; transform: translate(calc(-50% - 25vw), calc(-50% + 25vh)) scale(0.1) rotate(-150deg); } }
    @keyframes splash4 { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8) rotate(0deg); } 100% { opacity: 1; transform: translate(calc(-50% + 30vw), calc(-50% + 20vh)) scale(0.4) rotate(80deg); } }
    @keyframes splash5 { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); } 100% { opacity: 1; transform: translate(calc(-50% - 10vw), calc(-50% - 35vh)) scale(0) rotate(-45deg); } }
    @keyframes splash6 { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(0deg); } 100% { opacity: 1; transform: translate(calc(-50% + 10vw), calc(-50% + 30vh)) scale(0.2) rotate(60deg); } }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .clip-burst {
      clip-path: polygon(
        0% 15%, 20% 20%, 10% 0%, 35% 15%, 50% 0%, 
        65% 15%, 90% 0%, 80% 20%, 100% 15%, 90% 35%, 
        100% 50%, 85% 65%, 100% 85%, 80% 80%, 90% 100%, 
        65% 85%, 50% 100%, 35% 85%, 10% 100%, 20% 80%, 
        0% 85%, 15% 65%, 0% 50%, 10% 35%
      );
    }
    
    .clip-shard-1 { clip-path: polygon(0% 10%, 100% 0%, 80% 100%, 20% 90%); }
    .clip-shard-2 { clip-path: polygon(10% 0%, 100% 20%, 90% 100%, 0% 80%); }
    .clip-shard-3 { clip-path: polygon(50% 0%, 100% 80%, 0% 100%); }

    @keyframes sliceInRight {
      0% { clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%); opacity: 0; transform: translateX(50px); }
      100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); opacity: 1; transform: translateX(0); }
    }
    @keyframes stampIn {
      0% { transform: scale(3) rotate(15deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes textSlam {
      0% { transform: translate(100vw, -50vh) rotate(45deg) scale(2); opacity: 0; }
      100% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
    }
    @keyframes pulseHacker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    @keyframes p5GlitchBg {
      0%   { background-color: #fff; color: #000; transform: scale(1.05) skewX(-10deg) translate(0px, 0px); }
      10%  { background-color: var(--glitch-blue); color: #fff; transform: scale(1.06) skewX(-12deg) translate(-4px, 2px); }
      20%  { background-color: #000; color: #fff; transform: scale(1.04) skewX(-8deg) translate(4px, -2px); }
      30%  { background-color: #fff; color: #000; transform: scale(1.05) skewX(-11deg) translate(-2px, 4px); }
      40%  { background-color: var(--glitch-blue); color: #fff; transform: scale(1.06) skewX(-9deg) translate(2px, -4px); }
      50%  { background-color: #000; color: #fff; transform: scale(1.04) skewX(-13deg) translate(-4px, -2px); }
      60%  { background-color: #fff; color: #000; transform: scale(1.05) skewX(-10deg) translate(4px, 2px); }
      70%  { background-color: var(--glitch-blue); color: #fff; transform: scale(1.06) skewX(-12deg) translate(-2px, -1px); }
      80%  { background-color: #000; color: #fff; transform: scale(1.04) skewX(-7deg) translate(1px, 4px); }
      90%  { background-color: #fff; color: #000; transform: scale(1.05) skewX(-11deg) translate(3px, -3px); }
      100% { background-color: #fff; color: #000; transform: scale(1.05) skewX(-10deg) translate(0px, 0px); }
    }
    @keyframes p5GlitchOutline {
      0%   { transform: translate(6px, 6px); border-color: var(--glitch-blue); }
      25%  { transform: translate(-6px, -4px); border-color: #000; }
      50%  { transform: translate(4px, -6px); border-color: #fff; }
      75%  { transform: translate(-4px, 6px); border-color: var(--glitch-blue); }
      100% { transform: translate(0px, 0px); border-color: transparent; }
    }

    .glitch-hover { transition: transform 0.2s ease-out; }
    
    @media (hover: hover) and (pointer: fine) {
      .glitch-hover:hover {
        animation: p5GlitchBg 0.8s infinite step-end !important;
        border: 4px solid black !important;
        z-index: 50;
        outline: none;
      }
      .glitch-hover:hover::after {
        content: '';
        position: absolute;
        top: -4px; left: -4px; right: -4px; bottom: -4px;
        border: 3px solid var(--glitch-blue);
        animation: p5GlitchOutline 0.6s infinite step-end;
        pointer-events: none;
        z-index: 20;
      }
    }

    .glitch-hover:active {
      animation: p5GlitchBg 0.8s infinite step-end !important;
      border: 4px solid black !important;
      z-index: 50;
      outline: none;
    }
    .glitch-hover:active::after {
      content: '';
      position: absolute;
      top: -4px; left: -4px; right: -4px; bottom: -4px;
      border: 3px solid var(--glitch-blue);
      animation: p5GlitchOutline 0.6s infinite step-end;
      pointer-events: none;
      z-index: 20;
    }

    .clip-slanted { clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); }
    .clip-jagged { clip-path: polygon(0% 5%, 95% 0%, 100% 95%, 5% 100%); }
    .anim-slice-r { animation: sliceInRight 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
    .anim-stamp { animation: stampIn 0.3s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; }
    .anim-slam { animation: textSlam 0.4s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; }
    
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    
    .font-heavy-zh { font-weight: 900; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // === 首页 ===
    const HomePage = ({ onEnter }) => {
      return (
        <div 
          className="w-full h-[100dvh] bg-transparent relative overflow-hidden cursor-pointer" 
          onClick={onEnter}
          style={{ animation: 'screenShake 0.4s ease-out 0.3s forwards' }}
        >
          <div className="absolute inset-0 z-0 flex items-center justify-center pointer-events-none pb-48 md:pb-0">
            <div className="relative w-[90vw] h-[45vw] md:w-[600px] md:h-[300px]">
              <div 
                className="absolute top-1/2 left-1/2 w-full h-full bg-black clip-burst"
                style={{ animation: 'dotAppear 0.3s ease-out forwards, burstExpand 0.7s cubic-bezier(0.1, 0.9, 0.2, 1) 0.3s forwards' }}
              ></div>
              <div className="absolute top-1/2 left-1/2 w-[15vw] md:w-24 h-[10vw] md:h-16 bg-black clip-shard-1 shard-element" style={{ animation: 'splash1 0.6s cubic-bezier(0.1, 0.9, 0.2, 1) 0.3s forwards' }}></div>
              <div className="absolute top-1/2 left-1/2 w-[10vw] md:w-16 h-[15vw] md:h-24 bg-black clip-shard-2 shard-element" style={{ animation: 'splash2 0.7s cubic-bezier(0.1, 0.9, 0.2, 1) 0.3s forwards' }}></div>
              <div className="absolute top-1/2 left-1/2 w-[20vw] md:w-32 h-[12vw] md:h-20 bg-black clip-shard-3 shard-element" style={{ animation: 'splash3 0.5s cubic-bezier(0.1, 0.9, 0.2, 1) 0.3s forwards' }}></div>
              <div className="absolute top-1/2 left-1/2 w-[12vw] md:w-20 h-[12vw] md:h-20 bg-black clip-shard-1 shard-element" style={{ animation: 'splash4 0.8s cubic-bezier(0.1, 0.9, 0.2, 1) 0.3s forwards' }}></div>
              <div className="absolute top-1/2 left-1/2 w-[18vw] md:w-28 h-[8vw] md:h-12 bg-black clip-shard-2 shard-element" style={{ animation: 'splash5 0.65s cubic-bezier(0.1, 0.9, 0.2, 1) 0.3s forwards' }}></div>
              <div className="absolute top-1/2 left-1/2 w-[8vw] md:w-14 h-[15vw] md:h-24 bg-black clip-shard-3 shard-element" style={{ animation: 'splash6 0.55s cubic-bezier(0.1, 0.9, 0.2, 1) 0.3s forwards' }}></div>
            </div>
          </div>

          <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mix-blend-difference text-white z-10 w-full px-4 pb-48 md:pb-0">
            <h1 className="text-[4.5rem] min-[375px]:text-6xl sm:text-7xl md:text-[10rem] font-heavy-zh italic tracking-widest leading-none m-0 text-center whitespace-nowrap" style={{ animation: 'textFall 0.3s cubic-bezier(0.5, 0, 1, 1) forwards' }}>
              作品集
            </h1>
            <div 
              className="bg-white text-black px-4 md:px-8 py-2 mt-4 md:mt-8 text-lg md:text-3xl font-heavy-zh clip-slanted opacity-0" 
              style={{ animation: 'fadeUp 0.5s ease-out 0.8s forwards' }}
            >
              数字艺术与交互设计
            </div>
          </div>
            
          <div className="absolute inset-x-0 bottom-32 md:bottom-12 flex justify-center z-20 pointer-events-none">
            <div 
              className="text-base md:text-xl font-heavy-zh tracking-widest uppercase opacity-0 text-black" 
              style={{ animation: 'fadeUp 0.5s ease-out 1.2s forwards' }}
            >
              <span style={{ animation: 'pulseHacker 1.5s infinite 1.7s' }}>点击任意位置开始</span>
            </div>
          </div>
        </div>
      );
    };

    // === 菜单页 ===
    const MenuPage = ({ onNavigate }) => {
      const menuItems = [
        { id: 'gallery', cn: '作品画廊', en: 'GALLERY', angle: -4, delay: '0.1s' },
        { id: 'profile', cn: '个人档案', en: 'PROFILE', angle: 3, delay: '0.2s' }
      ];

      return (
        <div className="w-full h-[100dvh] relative bg-transparent overflow-hidden">
          <div className="absolute top-0 right-0 w-[85%] md:w-3/4 h-full bg-black anim-slice-r" style={{ clipPath: 'polygon(20% 0, 100% 0, 100% 100%, 0% 100%)', animationDelay: '0s' }}></div>
          <div className="absolute top-4 md:top-10 left-[-5%] w-1/3 md:w-1/4 h-1/2 bg-white border-4 md:border-8 border-black clip-slanted" style={{ animation: 'sliceIn 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) 0.1s forwards', opacity: 0 }}></div>

          <div className="absolute top-6 left-4 md:top-8 md:left-8 z-20">
            <h2 className="text-5xl md:text-8xl font-black text-black italic anim-stamp leading-tight" style={{ WebkitTextStroke: '1px white', animationDelay: '0.5s' }}>
              MENU<br/>& SYS
            </h2>
          </div>

          <div className="absolute top-[30%] md:top-1/3 right-4 md:right-32 flex flex-col items-end gap-8 md:gap-12 z-30">
            {menuItems.map((item, index) => (
              <div 
                key={item.id}
                className="anim-slam opacity-0 w-full flex justify-end"
                style={{ 
                  animationDelay: item.delay,
                  animationFillMode: 'forwards'
                }}
              >
                <button
                  onClick={() => onNavigate(item.id)}
                  onTouchStart={() => {}}
                  className="group relative flex items-center justify-end w-[85vw] max-w-[320px] md:max-w-none md:w-[500px] p-4 md:p-6 bg-black text-white cursor-pointer glitch-hover border-4 border-transparent"
                  style={{ 
                    transform: `rotate(${item.angle}deg)`, 
                    clipPath: 'polygon(5% 0, 100% 0, 95% 100%, 0 100%)'
                  }}
                >
                  <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMSIvPgo8L3N2Zz4=')] opacity-50 pointer-events-none"></div>
                  
                  <div className="relative z-10 text-right pointer-events-none">
                    <div className="text-4xl md:text-6xl font-heavy-zh italic">{item.cn}</div>
                    <div className="text-sm md:text-xl font-bold tracking-widest opacity-70 uppercase mt-1">{item.en}</div>
                  </div>
                  <div className="absolute left-6 md:left-8 text-4xl md:text-6xl font-black opacity-20 italic pointer-events-none">
                    0{index + 1}
                  </div>
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // === 作品画廊页 ===
    const GalleryPage = ({ onBack, onNavigate }) => {
      const projects = [
        { 
          id: 1, 
          title: 'SANXINGDUI·CODE-X', 
          subtitle: '沉浸式空间设计', 
          img: './111.png',
          fallback: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=800&q=80',
          route: 'project-sanxingdui' 
        },
        { 
          id: 2, 
          title: '瓷艺坊', 
          subtitle: '视觉与UI设计', 
          img: './启动.jpg',
          fallback: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80',
          route: 'project-ciyifang'
        }
      ];

      return (
        <div className="w-full h-[100dvh] bg-black text-white overflow-y-auto overflow-x-hidden hide-scroll relative pb-32">
          <div className="sticky top-0 z-50 w-full flex justify-between items-center p-4 md:p-6 bg-black border-b-4 border-white anim-slice-r">
            <button 
              onClick={onBack} 
              onTouchStart={() => {}}
              className="text-base md:text-xl font-heavy-zh bg-white text-black px-4 md:px-6 py-2 clip-slanted glitch-hover transition-colors border-4 border-transparent cursor-pointer"
            >
              &lt; MENU
            </button>
            <h2 className="text-2xl md:text-4xl font-heavy-zh italic tracking-widest">GALLERY</h2>
          </div>

          <div className="flex flex-col items-center mt-8 md:mt-12 gap-12 md:gap-20 px-4 md:px-8">
            {projects.map((proj, index) => (
              <div 
                key={proj.id} 
                onClick={() => onNavigate(proj.route)}
                className="w-full max-w-4xl relative anim-slam opacity-0 cursor-pointer group"
                style={{ 
                  animationDelay: `${0.2 * (index + 1)}s`,
                  animationFillMode: 'forwards' 
                }}
              >
                <div className="absolute inset-0 bg-white clip-jagged transform translate-x-2 translate-y-2 md:translate-x-4 md:translate-y-4 group-hover:translate-x-6 group-hover:translate-y-6 transition-transform duration-300"></div>
                
                <div className="relative bg-black border-2 md:border-4 border-white clip-jagged p-2 md:p-4 pb-4 md:pb-6 group-hover:border-[var(--glitch-blue)] transition-colors duration-300">
                  <div className="relative h-48 sm:h-64 md:h-96 w-full overflow-hidden grayscale group-hover:grayscale-0 transition-all duration-500">
                    <img 
                      src={proj.img} 
                      onError={(e) => { e.target.onerror = null; e.target.src = proj.fallback; }} 
                      alt={proj.title} 
                      className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" 
                    />
                    
                    <div className="absolute bottom-2 md:bottom-4 left-0 md:left-4 bg-white text-black px-6 md:px-8 py-1 md:py-2 clip-slanted font-heavy-zh text-lg sm:text-2xl md:text-4xl italic shadow-xl">
                      {proj.title}
                    </div>

                    <div className="absolute top-4 right-4 bg-[var(--glitch-blue)] text-white px-4 py-1 font-black italic tracking-widest clip-jagged opacity-0 group-hover:opacity-100 transition-opacity duration-300 shadow-xl">
                      VIEW PROJECT
                    </div>
                  </div>
                  
                  <div className="mt-4 md:mt-6 flex justify-between items-end pl-6 pr-2 md:pl-10 md:pr-4">
                    <div className="text-base sm:text-xl md:text-2xl font-heavy-zh tracking-widest">{proj.subtitle}</div>
                    <div className="text-2xl md:text-4xl font-black italic opacity-20">NO.0{index + 1}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // === 《瓷艺坊》项目详情页 ===
    const ProjectCiyifangPage = ({ onBack }) => {
      return (
        <div className="w-full h-[100dvh] bg-[var(--bg-color)] text-black overflow-y-auto overflow-x-hidden hide-scroll relative pb-32">
          
          <div className="sticky top-0 z-50 w-full flex justify-between items-center p-4 md:p-6 bg-black border-b-4 border-white anim-slice-r">
            <button 
              onClick={onBack} 
              className="text-base md:text-xl font-heavy-zh bg-white text-black px-4 md:px-6 py-2 clip-slanted glitch-hover border-4 border-transparent cursor-pointer"
            >
              &lt; BACK
            </button>
            <h2 className="text-xl md:text-2xl font-heavy-zh italic tracking-widest text-white">CI YI FANG</h2>
          </div>

          <div className="max-w-6xl mx-auto px-4 md:px-8 mt-12 flex flex-col gap-16 md:gap-24">
            
            <div className="anim-slam opacity-0" style={{ animationDelay: '0.1s', animationFillMode: 'forwards' }}>
              <h1 className="text-6xl md:text-8xl lg:text-[7rem] font-heavy-zh italic tracking-widest leading-none m-0">
                瓷艺坊
              </h1>
              <div className="inline-block bg-black text-white px-6 py-2 mt-4 text-xl md:text-3xl font-heavy-zh clip-slanted">
                科普小游戏 / UI界面设计
              </div>
            </div>

            {/* 01. 项目介绍 */}
            <div className="flex flex-col md:flex-row gap-8 anim-slam opacity-0" style={{ animationDelay: '0.2s', animationFillMode: 'forwards' }}>
              <div className="w-full md:w-1/3">
                <h2 className="text-4xl md:text-5xl font-black italic border-l-8 border-[var(--glitch-blue)] pl-4">01 /<br/>项目介绍</h2>
              </div>
              <div className="w-full md:w-2/3 flex flex-col gap-6">
                <div className="bg-white py-6 md:py-8 clip-jagged border-4 border-black shadow-[8px_8px_0_0_rgba(0,0,0,1)]" style={{ paddingLeft: '6%', paddingRight: '6%' }}>
                  <h3 className="text-2xl font-heavy-zh mb-3">项目背景</h3>
                  <p className="text-base md:text-lg font-bold leading-relaxed opacity-90 text-justify">
                    <strong className="text-[var(--glitch-blue)]">历史与文化价值：</strong>德化白瓷（中国白）拥有从新石器时代至今的悠久历史，具有极高的艺术与收藏价值。<br/><br/>
                    <strong className="text-[var(--glitch-blue)]">市场学习痛点：</strong>当前用户面临缺乏系统性陶瓷工艺学习资源、难以找到行业专家交流平台、以及对传统文化了解渠道有限等痛点。<br/><br/>
                    <strong className="text-[var(--glitch-blue)]">数字化传播趋势：</strong>基于德化窑作为“活态遗产”的特性，亟需通过数字技术（如3D展示、云端模拟）来增强文化的现代传播力。
                  </p>
                </div>
                <div className="bg-black text-white py-6 md:py-8 clip-slanted border-4 border-white" style={{ paddingLeft: '12%', paddingRight: '12%' }}>
                  <h3 className="text-2xl font-heavy-zh mb-3">设计目标</h3>
                  <p className="text-base md:text-lg font-bold leading-relaxed opacity-90 text-justify">
                    <strong>文化传承与普及：</strong>旨在传承推广德化白瓷历史，通过教育普及吸引国内外用户。<br/>

    // === 主路由控制 ===
    function App() {
      const [currentPage, setCurrentPage] = useState('home');

      const renderPage = () => {
        switch (currentPage) {
          case 'home': return <HomePage onEnter={() => setCurrentPage('menu')} />;
          case 'menu': return <MenuPage onNavigate={(page) => setCurrentPage(page)} />;
          case 'gallery': return <GalleryPage onBack={() => setCurrentPage('menu')} onNavigate={(page) => setCurrentPage(page)} />;
          case 'profile': return <ProfilePage onBack={() => setCurrentPage('menu')} />;
          case 'project-ciyifang': return <ProjectCiyifangPage onBack={() => setCurrentPage('gallery')} />;
          case 'project-sanxingdui': return <ProjectSanxingduiPage onBack={() => setCurrentPage('gallery')} />;
          default: return <HomePage onEnter={() => setCurrentPage('menu')} />;
        }
      };

      return (
        <div key={currentPage} className="w-full h-full">
          {renderPage()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
